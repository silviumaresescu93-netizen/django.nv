name: Django

on:
  push:
    branches:
      - main
    tags:   # pentru prod
      - '*' 

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - run: echo "This is a build step"

  test:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - run: echo "This is a test step"

  oast:
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v2

      - run: docker run --rm -v $(pwd):/src hysnsec/safety check -r requirements.txt --json > oast-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: Safety
          path: oast-results.json
        if: always()                        # what is this for?

  integration:
    needs: test
    runs-on: ubuntu-22.04
    continue-on-error: true   # permite jobului să dea fail fără să oprească workflow
    steps:
      - run: echo "This is an integration step"
      - run: exit 1

  prod:
    needs: integration
    if: startsWith(github.ref, 'refs/tags/')   # rulează doar la push de tag
    runs-on: ubuntu-22.04
    steps:
      - run: echo "This is a deploy step"

  artifact:
    needs: integration
    if: always()   # rulează indiferent dacă integration a eșuat
    runs-on: ubuntu-22.04
    steps:
      - run: echo "hello" > hello.txt
      - uses: actions/upload-artifact@v4
        with:
          name: hello-artifact
          path: hello.txt
